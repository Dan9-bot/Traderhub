<!DOCTYPE html>
<html>
<head>
<title>Traderhub Dashboard</title>

<style>
body{
background:#111827;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#ff4057;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.card{
background:#1f2937;
margin:20px;
padding:25px;
border-radius:20px;
}

button{
background:#ff4057;
color:white;
border:0;
padding:15px;
margin:5px;
border-radius:10px;
font-size:18px;
}

.balance{
font-size:30px;
}
</style>

</head>

<body>

<header>
Traderhub Dashboard
</header>

<div class="card">
<h2>Account</h2>
<p class="balance">$0.00</p>

<button>Connect Deriv</button>
</div>

<div class="card">
<h2>Wallet</h2>

<button>Deposit</button>
<button>Withdraw</button>

</div>

<div class="card">
<h2>Trading</h2>

<button>Manual Trader</button>
<button>Bot Builder</button>

</div>

<div class="card">
<h2>Markets</h2>
<p>Live Market Coming</p>
</div>

</body>
</html>
