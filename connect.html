<!DOCTYPE html>
<html>
<head>
<title>Connect Deriv</title>

<style>
body{
background:#111827;
color:white;
font-family:Arial;
margin:0;
}

.card{
background:#1f2937;
margin:40px 20px;
padding:30px;
border-radius:20px;
text-align:center;
}

input{
width:90%;
padding:15px;
border-radius:10px;
border:0;
font-size:16px;
}

button{
margin-top:20px;
background:#ff4057;
color:white;
border:0;
padding:15px 30px;
border-radius:10px;
font-size:18px;
}

#status{
margin-top:20px;
}
</style>

</head>

<body>

<div class="card">

<h2>Connect Deriv</h2>

<p>Enter your Deriv API token</p>

<input id="token" type="password" placeholder="API Token">

<br>

<button onclick="connectDeriv()">
Connect Account
</button>

<p id="status">Waiting...</p>

</div>


<script>

function connectDeriv(){

let token = document.getElementById("token").value.trim();

let status = document.getElementById("status");


if(token === ""){
status.innerHTML="Enter API token";
return;
}


status.innerHTML="Connecting to Deriv...";


let socket = new WebSocket(
"wss://ws.derivws.com/websockets/v3?app_id=33Pp6Q49Gvdxxyne3T2Ks"
);
  


socket.onopen=function(){

socket.send(JSON.stringify({
authorize: token
}));

};


socket.onmessage=function(event){

let data = JSON.parse(event.data);


if(data.authorize){

status.innerHTML="Connected successfully";


localStorage.setItem(
"deriv_account",
JSON.stringify(data.authorize)
);


setTimeout(()=>{
window.location.href="dashboard.html";
},1500);


}

else if(data.error){

status.innerHTML=data.error.message;

}

};


socket.onerror=function(){

status.innerHTML="Connection error";

};


}

</script>

</body>
</html>
