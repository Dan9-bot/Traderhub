<!DOCTYPE html>
<html>
<head>
    <title>Connect Deriv</title>
</head>
<body>

<h2 id="status">Connecting...</h2>

<script>
let token = " pat_00d8f2b68f16fab8fd2c7437df0425746237d1f654716d32616c138c07d6a460";

let status = document.getElementById("status");

let socket = new WebSocket("wss://ws.derivws.com/websockets/v3?app_id=33Pp6Q49Gvdxxyne3T2Ks");

socket.onerror = function () {
    status.innerHTML = "Connection error";
};

socket.onopen = function () {
    socket.send(JSON.stringify({
        authorize: token
    }));
};

socket.onmessage = function (event) {
    let data = JSON.parse(event.data);

    if (data.error) {
        status.innerHTML = data.error.message;
        return;
    }

    if (data.authorize) {
        status.innerHTML = "Connected successfully!";
    }
};
</script>

</body>
</html>
