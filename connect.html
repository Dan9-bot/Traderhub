<!DOCTYPE html>
<html>
<head>
<title>Connect Deriv</title>

<style>
body{
    background:#111827;
    color:white;
    font-family:Arial;
    margin:0;
}

.card{
    background:#1f2937;
    margin:40px 20px;
    padding:30px;
    border-radius:20px;
    text-align:center;
}

input{
    width:90%;
    padding:15px;
    border-radius:10px;
    border:0;
    margin:20px 0;
}

button{
    background:#ff4057;
    color:white;
    border:0;
    padding:15px 30px;
    border-radius:10px;
    font-size:18px;
}

#status{
    margin-top:20px;
}
</style>

</head>

<body>

<div class="card">

<h2>Connect Deriv</h2>

<p>Enter your Deriv API token</p>

<input id="token" type="password" placeholder="API Token">

<br>

<button onclick="connectDeriv()">
Connect Account
</button>

<p id="status">Waiting...</p>

</div>


<script>

function connectDeriv(){

let token = document.getElementById("token").value;

if(token==""){
document.getElementById("status").innerHTML="Enter API token";
return;
}


document.getElementById("status").innerHTML="Connecting to Deriv...";


let socket = new WebSocket(
"wss://ws.derivws.com/websockets/v3?app_id=1089"
);


socket.onopen=function(){

socket.send(JSON.stringify({
authorize: token
}));

};


socket.onmessage=function(msg){

let data = JSON.parse(msg.data);


if(data.authorize){

document.getElementById("status").innerHTML=
"Connected successfully";

localStorage.setItem(
"account",
JSON.stringify(data.authorize)
);

setTimeout(function(){
window.location.href="dashboard.html";
},1000);


}

else if(data.error){

document.getElementById("status").innerHTML=
data.error.message;

}

};


socket.onerror=function(){

document.getElementById("status").innerHTML=
"Connection error";

};


}

</script>

</body>
</html>
